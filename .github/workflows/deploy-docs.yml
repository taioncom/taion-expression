name: Deploy Docsite

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'docsite/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docsite/package-lock.json

      - name: Install and build library
        run: npm ci && npm run build

      - name: Install docsite dependencies
        run: npm ci
        working-directory: docsite

      - name: Build docsite
        run: npm run build
        working-directory: docsite

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docsite/build

      - id: deployment
        uses: actions/deploy-pages@v4
